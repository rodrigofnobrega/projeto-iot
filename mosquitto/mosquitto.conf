# ===== Configuração do broker Mosquitto (desenvolvimento) =====
# Persistência das mensagens/estado em disco
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type all
log_timestamp true

# ----- Listener MQTT (ESP32, publishers/subscribers) -----
listener 1883 0.0.0.0
protocol mqtt

# ----- Listener WebSocket (dashboard React via MQTT.js) -----
listener 9001 0.0.0.0
protocol websockets

# Em desenvolvimento permitimos conexões anônimas (sem usuário/senha).
# Para produção, desabilite e configure password_file.
allow_anonymous true
